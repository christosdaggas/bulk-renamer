# Bulk Renamer - Flatpak Manifest
#
# Local build:
#   ./scripts/generate-cargo-sources.sh   # regenerate cargo-sources.json from Cargo.lock
#   flatpak-builder --user --install --force-clean build-dir com.chrisdaggas.bulk-renamer.yml
#
# Flathub submission: switch the `type: dir` source below to the commented-out
# `type: git` source (Flathub rejects dir sources).

app-id: com.chrisdaggas.bulk-renamer
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: bulk-renamer

finish-args:
  # Wayland, with X11 fallback (ipc is required for X11 shared memory)
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # GPU acceleration for GTK rendering
  - --device=dri
  # Full host filesystem access is required: this is a bulk file renamer and
  # must be able to rename arbitrary user-selected files and folders anywhere
  # on the system (portals only cover opening, not in-place renaming of
  # whole directory trees).
  - --filesystem=host

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/bulk-renamer/cargo

modules:
  - name: bulk-renamer
    buildsystem: simple
    build-commands:
      # Resolve dependencies from the vendored crates (cargo-sources.json)
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      # Build the application
      - cargo --offline build --release
      # Install binary
      - install -Dm755 target/release/bulk-renamer /app/bin/bulk-renamer
      # Install desktop file
      - install -Dm644 data/com.chrisdaggas.bulk-renamer.desktop /app/share/applications/com.chrisdaggas.bulk-renamer.desktop
      # Install metainfo
      - install -Dm644 data/com.chrisdaggas.bulk-renamer.metainfo.xml /app/share/metainfo/com.chrisdaggas.bulk-renamer.metainfo.xml
      # Install app icon
      - install -Dm644 data/icons/hicolor/scalable/apps/com.chrisdaggas.bulk-renamer.svg /app/share/icons/hicolor/scalable/apps/com.chrisdaggas.bulk-renamer.svg
      # Compile and install translations
      - bash scripts/compile-translations.sh /app/share/locale
    sources:
      # ----- LOCAL DEVELOPMENT SOURCE ---------------------------------------
      # Builds from the working tree. Flathub does NOT accept `type: dir`
      # sources; for submission, comment this block out and enable the git
      # source below.
      - type: dir
        path: .
        skip:
          - target
          - build-dir
          - .flatpak-builder
      # ----- FLATHUB SUBMISSION SOURCE --------------------------------------
      # Required for Flathub. Point tag/commit at the actual release:
      # - type: git
      #   url: https://github.com/christosdaggas/bulk-renamer.git
      #   tag: v1.0.0  # TODO: replace with the real release tag
      #   commit: TODO_RELEASE_COMMIT_SHA
      # ----------------------------------------------------------------------
      # Vendored crate sources generated from Cargo.lock so the build can run
      # offline. Regenerate with scripts/generate-cargo-sources.sh whenever
      # Cargo.lock changes.
      - cargo-sources.json
